version: "3.9"

services:
  webui:
    image: universonic/stable-diffusion-webui:latest
    container_name: sd-webui
    restart: unless-stopped
    ports:
      - "7860:7860"
    environment:
      - CLI_ARGS=--api --listen --xformers
    volumes:
      - ./data/models:/data/models
      - ./data/outputs:/data/outputs
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
